<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>Big Keyboard</title>
    <script>
      // Cache-bust assets to avoid stale Android Chrome refresh.
      (() => {
        const v = Date.now();
        const css = document.createElement("link");
        css.rel = "stylesheet";
        css.href = `./styles.css?v=${v}`;
        document.head.appendChild(css);

        const js = document.createElement("script");
        js.src = `./script.js?v=${v}`;
        js.defer = true;
        document.head.appendChild(js);
      })();
    </script>
  </head>
  <body>
    <main class="app" aria-label="Accessible text input tool">
      <section class="top-controls" aria-label="Controls">
        <button id="clear-btn" class="top-btn" type="button">Clear</button>
        <button id="fullscreen-btn" class="top-btn" type="button">Full Screen</button>
      </section>

      <section class="display-panel" aria-live="polite">
        <h1 class="panel-title">Your text will appear here</h1>
        <output id="text-output" class="text-output" aria-label="Entered text"></output>
      </section>

      <section class="keyboard-panel" aria-label="QWERTY keyboard characters">
        <div id="key-grid" class="key-grid" role="grid" aria-label="QWERTY key grid"></div>
      </section>
    </main>

  </body>
</html>
