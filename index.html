<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>Big Keyboard</title>
    <script>
      // Cache-bust assets to avoid stale Android Chrome refresh.
      (() => {
        const v = Date.now();
        const css = document.createElement("link");
        css.rel = "stylesheet";
        css.href = `./styles.css?v=${v}`;
        document.head.appendChild(css);

        const js = document.createElement("script");
        js.src = `./script.js?v=${v}`;
        js.defer = true;
        document.head.appendChild(js);
      })();
    </script>
  </head>
  <body>
    <main class="app" aria-label="Accessible text input tool">
      <section class="top-controls" aria-label="Controls">
        <button id="clear-btn" class="top-btn" type="button">Clear</button>
        <div class="top-spacer" aria-hidden="true"></div>
        <button id="fullscreen-btn" class="top-btn" type="button">Full Screen</button>
        <div class="top-spacer" aria-hidden="true"></div>
        <button id="options-btn" class="top-btn" type="button">Options</button>
        <div id="version-label" class="version-label" aria-label="App version"></div>
      </section>

      <section class="display-panel" aria-live="polite">
        <h1 id="mode-title" class="panel-title">Keyboard mode</h1>
        <output id="text-output" class="text-output" aria-label="Entered text"></output>
      </section>

      <section class="keyboard-panel" aria-label="QWERTY keyboard characters">
        <div id="key-grid" class="key-grid" role="grid" aria-label="QWERTY key grid"></div>
      </section>
    </main>

    <div id="options-modal" class="modal-overlay" hidden>
      <div
        class="modal"
        role="dialog"
        aria-modal="true"
        aria-labelledby="options-title"
        aria-describedby="options-body"
      >
        <h2 id="options-title" class="modal-title">Options</h2>
        <div id="options-body" class="modal-body">
          For more info visit
          <a href="https://github.com/joelbyrnes/big-keyboard" target="_blank" rel="noreferrer">
            github.com/joelbyrnes/big-keyboard
          </a>
        </div>
        <div class="modal-actions">
          <button id="options-close-btn" class="top-btn" type="button">Close</button>
        </div>
      </div>
    </div>
  </body>
</html>
